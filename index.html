      color: #fff;

      from { opacity: 0; }

    @keyframes slideUp {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }

    .no-results {

      background: #0a0a0a;
      margin-top: 50px;
      border-top: 1px solid #333;
      color: #666;
    }

    .hidden-canvas {
      display: none;

</head>

      category: "abg",

      tags: ["abg", "sange", "pagi"],
      thumbnailTime: 3
    }
  ];

  // Kategori unik dari data
  const categories = [...new Set(videoList.map(v => v.category))];
  
  let currentVideo = null;
  let popupTimer = null;
  let popupShown = false;
  let filteredVideos = [...videoList];
  let activeCategory = 'all';
  let searchQuery = '';

  // Elemen untuk generate thumbnail
  const hiddenVideo = document.getElementById('thumbnail-generator');
  const hiddenCanvas = document.getElementById('thumbnail-canvas');
  const ctx = hiddenCanvas.getContext('2d');

  // Cache thumbnail yang sudah digenerate
  const thumbnailCache = new Map();

  // Inisialisasi
  document.addEventListener('DOMContentLoaded', function() {
    loadCategoryButtons();
    loadVideoGrid(videoList);
    updateResultCount(videoList.length);
    
    const modalVideo = document.getElementById('modal-video');
    
    // Event untuk popup saat video diputar
    modalVideo.addEventListener('play', function() {
      if (!popupShown && currentVideo) {
        if (popupTimer) clearTimeout(popupTimer);
        popupTimer = setTimeout(() => {
          if (!popupShown && !modalVideo.paused && document.getElementById('video-modal').style.display === 'flex') {
            modalVideo.pause();
            document.getElementById('popup-overlay').style.display = 'flex';
            popupShown = true;
          }
        }, 5000);
      }
    });

    // Event untuk search dengan enter
    document.getElementById('search-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        searchVideos();
      }
    });

    // Tutup modal dengan ESC
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeVideoModal();
      }
    });

    // Generate thumbnail untuk semua video
    generateAllThumbnails();
  });

  // Generate thumbnail dari video
  async function generateThumbnail(videoUrl, timeInSeconds = 5) {
    // Cek cache dulu
    if (thumbnailCache.has(videoUrl)) {
      return thumbnailCache.get(videoUrl);
    }

    return new Promise((resolve, reject) => {
      // Set video source
      hiddenVideo.src = videoUrl;
      hiddenVideo.crossOrigin = "anonymous";
      hiddenVideo.currentTime = timeInSeconds;
      
      // Fungsi saat video siap
      const onSeeked = () => {
        // Gambar frame ke canvas
        ctx.drawImage(hiddenVideo, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
        
        // Konversi ke data URL
        const thumbnailDataUrl = hiddenCanvas.toDataURL('image/jpeg', 0.8);
        
        // Simpan ke cache
        thumbnailCache.set(videoUrl, thumbnailDataUrl);
        
        // Bersihkan event listener
        hiddenVideo.removeEventListener('seeked', onSeeked);
        hiddenVideo.removeEventListener('error', onError);
        
        // Hentikan video
        hiddenVideo.pause();
        hiddenVideo.src = '';
        hiddenVideo.load();
        
        resolve(thumbnailDataUrl);
      };
      
      const onError = (error) => {
        hiddenVideo.removeEventListener('seeked', onSeeked);
        hiddenVideo.removeEventListener('error', onError);
        reject(error);
      };
      
      hiddenVideo.addEventListener('seeked', onSeeked);
      hiddenVideo.addEventListener('error', onError);
      
      // Load video
      hiddenVideo.load();
    });
  }

  // Generate thumbnail untuk semua video
  async function generateAllThumbnails() {
    const promises = videoList.map(video => 
      generateThumbnail(video.videoUrl, video.thumbnailTime || 5)
        .then(thumbnailUrl => {
          video.generatedThumbnail = thumbnailUrl;
        })
        .catch(error => {
          console.error(`Gagal generate thumbnail untuk ${video.title}:`, error);
          // Gunakan thumbnail default jika gagal
          video.generatedThumbnail = 'https://via.placeholder.com/320x180/1a1a1a/ff3c5f?text=No+Preview';
        })
    );
    
    await Promise.all(promises);
    
    // Reload grid dengan thumbnail yang sudah digenerate
    filterAndSortVideos();
  }

  // Load kategori buttons
  function loadCategoryButtons() {
    const filterDiv = document.getElementById('category-filter');
    filterDiv.innerHTML = `
      <button class="category-btn active" onclick="filterByCategory('all')">Semua</button>
      ${categories.map(cat => `
        <button class="category-btn" onclick="filterByCategory('${cat}')">${cat.toUpperCase()}</button>
      `).join('')}
    `;
  }

  // Filter by category
  function filterByCategory(category) {
    activeCategory = category;
    
    // Update active class
    document.querySelectorAll('.category-btn').forEach(btn => {
      btn.classList.remove('active');
    });
    event.target.classList.add('active');
    
    filterAndSortVideos();
  }

  // Search videos
  function searchVideos() {
    searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
    filterAndSortVideos();
  }

  // Filter dan sortir
  function filterAndSortVideos() {
    // Filter berdasarkan kategori dan search
    filteredVideos = videoList.filter(video => {
      // Filter kategori
      if (activeCategory !== 'all' && video.category !== activeCategory) {
        return false;
      }
      
      // Filter search
      if (searchQuery) {
        return video.title.toLowerCase().includes(searchQuery) ||
               video.tags.some(tag => tag.toLowerCase().includes(searchQuery)) ||
               video.category.toLowerCase().includes(searchQuery);
      }
      
      return true;
    });

    // Sortir
    const sortBy = document.getElementById('sort-select').value;
    
    switch(sortBy) {
      case 'newest':
        filteredVideos.sort((a, b) => new Date(b.date) - new Date(a.date));
        break;
      case 'popular':
        filteredVideos.sort((a, b) => b.views - a.views);
        break;
      case 'views':
        filteredVideos.sort((a, b) => b.views - a.views);
        break;
      case 'longest':
        filteredVideos.sort((a, b) => b.durationSec - a.durationSec);
        break;
      case 'shortest':
        filteredVideos.sort((a, b) => a.durationSec - b.durationSec);
        break;
    }

    // Update tampilan
    loadVideoGrid(filteredVideos);
    updateResultCount(filteredVideos.length);
    
    // Tampilkan tombol clear filter jika ada filter aktif
    const clearBtn = document.getElementById('clear-filter');
    if (activeCategory !== 'all' || searchQuery) {
      clearBtn.style.display = 'block';
    } else {
      clearBtn.style.display = 'none';
    }
  }

  // Clear semua filter
  function clearAllFilters() {
    activeCategory = 'all';
    searchQuery = '';
    document.getElementById('search-input').value = '';
    document.getElementById('sort-select').value = 'newest';
    
    // Reset active class di kategori
    document.querySelectorAll('.category-btn').forEach((btn, index) => {
      if (index === 0) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
    
    filterAndSortVideos();
  }

  // Update result count
  function updateResultCount(count) {
    document.getElementById('result-count').innerHTML = `Menampilkan <span>${count}</span> video`;
  }

  // Load video grid
  function loadVideoGrid(videos) {
    const grid = document.getElementById('video-grid');
    
    if (videos.length === 0) {
      grid.innerHTML = '<div class="no-results">❌ Tidak ada video ditemukan</div>';
      return;
    }
    
    grid.innerHTML = videos.map(video => {
      const thumbnailSrc = video.generatedThumbnail || 'https://via.placeholder.com/320x180/1a1a1a/ff3c5f?text=Loading...';
      
      return `
        <div class="video-card" onclick="openVideo(${JSON.stringify(video).replace(/"/g, '&quot;')})">
          <div class="thumbnail-container">
            <img class="thumbnail" src="${thumbnailSrc}" alt="${video.title}" loading="lazy">
            <span class="quality-badge">${video.quality}</span>
            <span class="duration">${video.duration}</span>
          </div>
          <div class="video-info">
            <div class="video-title">${video.title}</div>
            <div class="video-meta">
              <span class="views">👁️ ${video.viewsFormatted}</span>
              <span class="category-tag">${video.category}</span>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  // Buka video
  function openVideo(video) {
    currentVideo = video;
    popupShown = false;
    
    const modal = document.getElementById('video-modal');
    const modalVideo = document.getElementById('modal-video');
    const modalTitle = document.getElementById('modal-title');
    
    modalTitle.textContent = video.title;
    modalVideo.src = video.videoUrl;
    
    modal.style.display = 'flex';
    modalVideo.play().catch(e => console.log('Autoplay dicegah'));
    
    if (popupTimer) clearTimeout(popupTimer);
  }

  // Tutup modal
  function closeVideoModal() {
    const modal = document.getElementById('video-modal');
    const modalVideo = document.getElementById('modal-video');
    
    modalVideo.pause();
    modalVideo.src = '';
    modal.style.display = 'none';
    
    if (popupTimer) {
      clearTimeout(popupTimer);
      popupTimer = null;
    }
    
    document.getElementById('popup-overlay').style.display = 'none';
  }

  // Tutup popup
  function closeAgePopup() {
    document.getElementById('popup-overlay').style.display = 'none';
  }

  // Lanjut ke iklan
  function goToAdAndPlay() {
    window.open('https://www.effectivegatecpm.com/q2imp5n2si?key=be55f8eebf062a8a0e227ce8a7491975', '_blank');
    
    document.getElementById('popup-overlay').style.display = 'none';
    
    const modalVideo = document.getElementById('modal-video');
    modalVideo.play().catch(e => console.log('Gagal play:', e));
  }
</script>

</div>
